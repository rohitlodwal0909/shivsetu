name: Deploy ShivSetu

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Prepare SSH Private Key
      - name: Prepare SSH Key
        env:
          SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          set -e

          echo "$SSH_KEY_B64" | base64 -d > "$HOME/deploy_key"
          chmod 600 "$HOME/deploy_key"

          echo "SSH key prepared"

          ssh-keygen -y -f "$HOME/deploy_key" > /tmp/public_key

          echo "SSH private key is valid"

      # 2. Test VPS Port 22
      - name: Test VPS SSH Port
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -e

          echo "Testing VPS connection..."
          echo "VPS Host: $VPS_HOST"

          timeout 10 bash -c "</dev/tcp/$VPS_HOST/22"

          echo "Port 22 is reachable"

      # 3. Deploy to VPS
      - name: Deploy ShivSetu
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: /home/runner/deploy_key
          port: 22

          script: |
            set -e

            echo "SSH connected successfully"

            cd /root/shivsetu/shivsetu

            echo "Fetching latest code..."
            git fetch origin main

            echo "Syncing VPS with GitHub main..."
            git reset --hard origin/main

            echo "Building Docker images..."
            docker compose build

            echo "Starting containers..."
            docker compose up -d

            echo "Checking containers..."
            docker ps

            echo "Deployment completed successfully!"
